<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitación Loviq</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400;500&display=swap');
  * { box-sizing: border-box; margin:0; padding:0; }
  body {
    background: #f5efe9;
    display:flex;
    justify-content:center;
    padding: 40px 16px;
    font-family:'Poppins', sans-serif;
  }
  .card {
    width: 460px;
    max-width:100%;
    background: linear-gradient(180deg, #fdf3f4 0%, #fbeef2 100%);
    border: 1px solid #eec9cf;
    border-radius: 22px;
    padding: 36px 32px 30px;
    position: relative;
    overflow:hidden;
    box-shadow: 0 12px 30px rgba(180,120,140,0.15);
  }
  .card::before, .card::after {
    content:"";
    position:absolute;
    border-radius:50%;
    opacity:0.35;
  }
  .card::before { width:120px; height:120px; background:#f0b7bd; top:-50px; left:-50px; }
  .card::after { width:150px; height:150px; background:#c9b8dd; bottom:-60px; right:-60px; }
  .logo {
    display:block;
    width: 120px;
    margin: 0 auto 8px;
    position:relative;
    z-index:2;
  }
  .eyebrow {
    text-align:center;
    letter-spacing: 3px;
    font-size: 11px;
    color:#a9829a;
    text-transform:uppercase;
    margin-bottom: 18px;
    position:relative;
    z-index:2;
  }
  h1 {
    text-align:center;
    font-family:'Playfair Display', serif;
    font-weight:600;
    font-size: 30px;
    color:#8a5a72;
    margin-bottom: 4px;
    position:relative;
    z-index:2;
  }
  .subtitle {
    text-align:center;
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-size:15px;
    color:#9d7a95;
    margin-bottom: 22px;
    position:relative;
    z-index:2;
  }
  .divider {
    width:70px;
    height:2px;
    background: linear-gradient(90deg,#e8a3ac,#b3a0cf);
    margin: 0 auto 22px;
    position:relative;
    z-index:2;
  }
  .details {
    display:flex;
    flex-direction:column;
    gap:14px;
    margin-bottom: 24px;
    position:relative;
    z-index:2;
  }
  .detail-row {
    display:flex;
    align-items:center;
    gap:12px;
    justify-content:center;
  }
  .icon {
    width:30px;
    height:30px;
    border-radius:50%;
    background:#f6dde1;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    flex-shrink:0;
    color:#b3679a;
  }
  .detail-text {
    text-align:left;
  }
  .detail-text .label {
    font-size:10px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:#b09bb4;
  }
  .detail-text .value {
    font-size:15px;
    color:#6d4a63;
    font-weight:500;
  }
  .rsvp {
    text-align:center;
    background: #fff;
    border: 1px dashed #dcaebb;
    border-radius: 14px;
    padding: 14px 18px;
    position:relative;
    z-index:2;
  }
  .rsvp p:first-child {
    font-size:12px;
    color:#a9829a;
    letter-spacing:1px;
    text-transform:uppercase;
    margin-bottom:4px;
  }
  .rsvp p:last-child {
    font-size:16px;
    color:#7a4f6d;
    font-weight:500;
  }
  .footer-mark {
    text-align:center;
    margin-top:20px;
    font-size:10px;
    color:#c3aabb;
    letter-spacing:1px;
    position:relative;
    z-index:2;
  }
</style>
</head>
